name: "Run Docker Android Cloud Phone"

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Start Docker Android Emulator
        run: |
          docker run -d --privileged \
            -p 6080:6080 \
            -p 5554:5554 \
            -p 5555:5555 \
            --name android-container \
            budtmo/docker-android:emulator_11.0

      - name: Install and Start noVNC
        run: |
          sudo apt update
          sudo apt install -y net-tools
          docker exec android-container /bin/bash -c "apt-get update && apt-get install -y novnc"

      - name: Keep the workflow alive and display connection URL
        run: |
          echo "=================================================="
          echo "🌐 Cloud Phone is ready! Access it via noVNC:"
          echo "👉 https://localhost:6080/vnc.html"
          echo "⚠️  You need to use a tool like 'ngrok' or 'Cloudflare Tunnel' to expose this URL to the internet."
          echo "=================================================="
          sleep 6h
