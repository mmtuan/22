name: "Netbird Server Session"
on:
  workflow_dispatch:
    inputs:
      duration:
        description: 'Thời gian chạy (phút)'
        required: true
        default: '300'

jobs:
  netbird-vps:
    runs-on: ubuntu-latest
    timeout-minutes: 350 # gần 6h

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Netbird and setup exit node
        run: |
          # Cài đặt Netbird
          curl -fsSL https://pkgs.netbird.io/install.sh | sh
          
          # Kết nối vào mạng và quảng bá là Exit Node
          # Lưu ý: Cần thay YOUR_SETUP_KEY bằng giá trị Secret
          sudo netbird up --setup-key ${{ secrets.NETBIRD_SETUP_KEY }} \
                          --management-url https://api.netbird.io \
                          --exit-node auto
                          
          # Đợi kết nối ổn định
          sleep 10
          
          # Hiển thị IP trong mạng Netbird
          netbird status --ip

      - name: Giữ máy chủ hoạt động
        run: sleep ${{ github.event.inputs.duration }}m
